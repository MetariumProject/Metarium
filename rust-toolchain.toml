[toolchain]
# Pinned to the narrow window this polkadot-sdk snapshot needs: >= 1.88
# (the vendored `revm` via `pallet-revive` requires rustc 1.88) and < 1.90
# (newer Rust turns some upstream `#[deprecated]` placements in
# frame-executive into hard errors). 1.89 satisfies both — verified building
# parachain-template-node.
channel = "1.89.0"
components = ["rust-src", "clippy", "rustfmt"]
targets = ["wasm32-unknown-unknown"]
profile = "minimal"
